# Baut bei einem Versions-Tag (z. B. v1.1.0) den Windows-Installer (NSIS) samt
# portabler .exe und das Linux-AppImage und hängt alles an ein GitHub-Release.
#
#   git tag v1.1.0
#   git push origin v1.1.0
#
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # manueller Start über die Actions-Oberfläche

permissions:
  contents: write # zum Anlegen des Releases nötig

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact: release/*.exe
          - os: ubuntu-latest
            script: build:linux
            artifact: release/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true
